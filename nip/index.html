<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nip Game - Bitboard Optimized</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #e0e0e0; margin: 0; padding: 20px; }
        #menu-screen, #game-screen { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; max-width: 650px; width: 100%; }
        h1 { margin-top: 0; color: #333; }
        #game-board { background-color: #7fb069; border: 3px solid #444; cursor: pointer; border-radius: 5px; max-width: 100%; height: auto; }
        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button, .link-button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background-color: #444; color: white; transition: background 0.2s; text-decoration: none; display: inline-block; }
        button:hover, .link-button:hover { background-color: #666; }
        #btn-pvp { background-color: #2c3e50; }
        #btn-pve { background-color: #27ae60; }
        #btn-back-home { background-color: #7f8c8d; margin-top: 25px; font-size: 14px; }
        #hint-btn { background-color: #f39c12; }
        #hint-btn:hover { background-color: #d35400; }
        .setting-group { margin: 15px 0; font-size: 18px; }
        select { padding: 8px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        #status-label { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #333; }
        #settings-display { font-size: 18px; font-weight: bold; color: #000000; margin-bottom: 15px; background: #f0f0f0; padding: 8px 15px; border-radius: 5px; display: inline-block; border: 1px solid #ccc; }
        #result-label { color: #e74c3c; font-size: 28px; font-weight: bold; display: none; margin: 15px; padding: 10px; border: 2px solid #e74c3c; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1>Nip Game</h1>
        <div class="setting-group">
            CPUレベル: 
            <select id="lv-select" onchange="window.selectedLv = parseInt(this.value)">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5" selected>5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                <option value="10">10</option>
            </select>
        </div>
        <div class="setting-group">
            CPUの色: 
            <select id="color-select" onchange="window.cpuColor = this.value">
                <option value="white" selected>白 (後手)</option>
                <option value="black">黒 (先手)</option>
            </select>
        </div>
        <button id="btn-pvp">対人戦 (PvP)</button>
        <button id="btn-pve">CPU戦 (PvE)</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
            <a href="https://chikuboya.github.io/" class="link-button" id="btn-back-home">Chikuboya Gamesトップへ戻る</a>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="controls" style="margin-bottom: 15px;">
            <button id="menu-btn">メニューへ</button>
            <button id="reset-btn">リセット</button>
        </div>

        <div id="settings-display"></div>
        <div id="status-label">準備中...</div>
        <div id="result-label"></div>
        <canvas id="game-board" width="600" height="650"></canvas>

        <div class="controls">
            <button id="undo-btn">待った</button>
            <button id="hint-btn">ヒント</button>
        </div>
    </div>

    <script>
        window.selectedLv = 5;
        window.cpuColor = "white";

        const VALID_COORDS = [[2,0], [3,0], [4,0], [5,0], [2,7], [3,7], [4,7], [5,7], [1,1], [2,1], [3,1], [4,1], [5,1], [6,1], [1,6], [2,6], [3,6], [4,6], [5,6], [6,6], [0,2], [1,2], [2,2], [3,2], [4,2], [5,2], [6,2], [7,2], [0,3], [1,3], [2,3], [3,3], [4,3], [5,3], [6,3], [7,3], [0,4], [1,4], [2,4], [3,4], [4,4], [5,4], [6,4], [7,4], [0,5], [1,5], [2,5], [3,5], [4,5], [5,5], [6,5], [7,5]];
        const CIRCUMFERENCE = [[0,3], [0,2], [1,1], [2,0], [3,0], [4,0], [5,0], [6,1], [7,2], [7,3], [7,4], [7,5], [6,6], [5,7], [4,7], [3,7], [2,7], [1,6], [0,5], [0,4]];
        const STRATEGIC_NODES = [[0,3], [7,3], [3,0], [3,7], [0,2], [7,2], [0,5], [7,5]];
        
        const VALID_MASK = VALID_COORDS.reduce((acc, [x, y]) => acc | (1n << BigInt(y * 8 + x)), 0n);
        const CIRCUM_MASK = CIRCUMFERENCE.reduce((acc, [x, y]) => acc | (1n << BigInt(y * 8 + x)), 0n);
        const STRATEGIC_MASK = STRATEGIC_NODES.reduce((acc, [x, y]) => acc | (1n << BigInt(y * 8 + x)), 0n);

        const AI_CONFIG = {
            CPU: { BASE: 1.0, STRATEGIC: 25.0, CIRCUM: 10.0 },
            HINT: { BASE: 1.0, STRATEGIC: 0, CIRCUM: 16.0 }
        };

        class NipWebGame {
            constructor() {
                this.canvas = document.getElementById("game-board");
                this.ctx = this.canvas.getContext("2d");
                this.status_label = document.getElementById("status-label");
                this.settings_display = document.getElementById("settings-display");
                this.result_label = document.getElementById("result-label");
                this.cell_size = 62;
                this.offset = 80;
                this.hint_move = null;
                this.setup_ui_events();
            }

            get_bit(x, y) { return 1n << BigInt(y * 8 + x); }

            get_flipped_bits(pos_bit, own, opp) {
                if ((pos_bit & VALID_MASK) === 0n || (pos_bit & (own | opp)) !== 0n) return 0n;
                let flipped = 0n;

                const dx = [1, -1, 0, 0, 1, -1, 1, -1];
                const dy = [0, 0, 1, -1, 1, -1, -1, 1];

                const coord = VALID_COORDS.find(c => this.get_bit(c[0], c[1]) === pos_bit);
                const x = Number(coord[0]), y = Number(coord[1]);

                for (let d = 0; d < 8; d++) {
                    let temp_flipped = 0n;
                    for (let step = 1; step < 8; step++) {
                        const nx = x + dx[d] * step, ny = y + dy[d] * step;
                        if (nx < 0 || nx > 7 || ny < 0 || ny > 7) break;
                        const nb = this.get_bit(nx, ny);
                        if (!(nb & VALID_MASK)) break;
                        if (nb & opp) temp_flipped |= nb;
                        else if (nb & own) { if (temp_flipped !== 0n) flipped |= temp_flipped; break; }
                        else break;
                    }
                }

                if (pos_bit & CIRCUM_MASK) {
                    let circIdx = CIRCUMFERENCE.findIndex(c => this.get_bit(c[0], c[1]) === pos_bit);
                    [1, -1].forEach(d => {
                        let potential_flipped = 0n;
                        for (let i = 1; i < CIRCUMFERENCE.length; i++) {
                            let idx = (circIdx + i * d + CIRCUMFERENCE.length) % CIRCUMFERENCE.length;
                            let b = this.get_bit(CIRCUMFERENCE[idx][0], CIRCUMFERENCE[idx][1]);
                            if (b & opp) potential_flipped |= b;
                            else if (b & own) { if (potential_flipped !== 0n) flipped |= potential_flipped; break; }
                            else break;
                        }
                    });
                }
                return flipped;
            }

            count_set_bits(n) {
                let count = 0;
                let temp = n & VALID_MASK;
                while (temp > 0n) { if (temp & 1n) count++; temp >>= 1n; }
                return count;
            }

            getMovePriority(pos_bit) {
                if (pos_bit & STRATEGIC_MASK) return 100;
                if (pos_bit & CIRCUM_MASK) return 50;
                return 0;
            }

            evaluate_board(own, opp, useHintNodes = false) {
                let score = 0;
                const total = this.count_set_bits(own | opp);
                const is_endgame = total > 42;
                const conf = useHintNodes ? AI_CONFIG.HINT : AI_CONFIG.CPU;

                // 石の数による実利計算
                const ownCount = this.count_set_bits(own);
                const oppCount = this.count_set_bits(opp);
                score += (ownCount - oppCount) * conf.BASE;

                // 拠点および円周の重み付け判定
                if (!useHintNodes) {
                    const strategicOwn = this.count_set_bits(own & STRATEGIC_MASK);
                    const strategicOpp = this.count_set_bits(opp & STRATEGIC_MASK);
                    score += (strategicOwn - strategicOpp) * (is_endgame ? 5.0 : conf.STRATEGIC);
                }

                const circumOwn = this.count_set_bits(own & CIRCUM_MASK);
                const circumOpp = this.count_set_bits(opp & CIRCUM_MASK);
                score += (circumOwn - circumOpp) * (is_endgame ? 3.0 : conf.CIRCUM);

                // 終盤の全体加点（旧コード再現）
                if (is_endgame) {
                    score += (ownCount - oppCount) * 5.0;
                }

                return score;
            }

            minimax(own, opp, depth, alpha, beta, is_maximizing, useHintNodes) {
                if (Date.now() - this.start_time > this.time_limit || this.abort_search) {
                    this.abort_search = true; return this.evaluate_board(own, opp, useHintNodes);
                }
                if (depth <= 0) return this.evaluate_board(own, opp, useHintNodes);

                let moves = [];
                const p_own = is_maximizing ? own : opp;
                const p_opp = is_maximizing ? opp : own;
                
                VALID_COORDS.forEach(([x, y]) => {
                    const b = this.get_bit(x, y);
                    const f = this.get_flipped_bits(b, p_own, p_opp);
                    if (f !== 0n) moves.push({b, f, prio: this.getMovePriority(b)});
                });

                if (moves.length === 0) return this.evaluate_board(own, opp, useHintNodes);
                moves.sort((a, b) => b.prio - a.prio);

                for (let m of moves) {
                    let v;
                    if (is_maximizing) {
                        v = this.minimax(own | m.b | m.f, opp & ~m.f, depth - 1, alpha, beta, false, useHintNodes);
                        alpha = Math.max(alpha, v);
                    } else {
                        v = this.minimax(own & ~m.f, opp | m.b | m.f, depth - 1, alpha, beta, true, useHintNodes);
                        beta = Math.min(beta, v);
                    }
                    if (beta <= alpha) break;
                }
                return is_maximizing ? alpha : beta;
            }

            show_hint() {
                if (this.is_game_over || (this.mode === "PvE" && this.turn === this.cpu_color)) return;
                this.status_label.innerText = "ヒント思考中...";
                setTimeout(() => {
                    this.start_time = Date.now(); this.time_limit = 3000; this.abort_search = false;
                    const own = this.turn === 'black' ? this.black_bits : this.white_bits;
                    const opp = this.turn === 'black' ? this.white_bits : this.black_bits;
                    let moves = [];
                    VALID_COORDS.forEach(([x, y]) => {
                        const b = this.get_bit(x, y);
                        const f = this.get_flipped_bits(b, own, opp);
                        if (f !== 0n) moves.push({m: [x,y], b, f, prio: this.getMovePriority(b)});
                    });
                    if (moves.length === 0) return;
                    moves.sort((a, b) => b.prio - a.prio);
                    let bestMove = moves[0].m;
                    for (let d = 1; d <= 14; d++) {
                        let cur_best_v = -1000000; let cur_best_m = null;
                        for (let move of moves) {
                            if (Date.now() - this.start_time > this.time_limit) { this.abort_search = true; break; }
                            let val = this.minimax(own | move.b | move.f, opp & ~move.f, d - 1, -1000000, 1000000, false, true);
                            if (val > cur_best_v) { cur_best_v = val; cur_best_m = move.m; }
                        }
                        if (this.abort_search) break;
                        bestMove = cur_best_m; this.current_hint_depth = d; 
                    }
                    this.hint_move = bestMove; this.draw();
                }, 50);
            }

            cpu_move() {
                if (this.is_game_over) return;
                const own = this.turn === 'black' ? this.black_bits : this.white_bits;
                const opp = this.turn === 'black' ? this.white_bits : this.black_bits;
                let moves = [];
                VALID_COORDS.forEach(([x, y]) => {
                    const b = this.get_bit(x, y);
                    const f = this.get_flipped_bits(b, own, opp);
                    if (f !== 0n) moves.push({m: [x, y], b, f});
                });
                if (moves.length === 0) return;
                const total = this.count_set_bits(own | opp);
                if (total <= 7) return this.make_move(moves[Math.floor(Math.random() * moves.length)].m);
                const lv_cfg = { 1:{d:0,r:0.7,t:100}, 2:{d:1,r:0.5,t:200}, 3:{d:1,r:0.3,t:300}, 4:{d:2,r:0.2,t:400}, 5:{d:2,r:0.1,t:500}, 6:{d:4,r:0.05,t:700}, 7:{d:6,r:0,t:900}, 8:{d:7,r:0,t:1100}, 9:{d:8,r:0,t:1300}, 10:{d:14,r:0,t:2000} };
                let cfg = lv_cfg[this.level] || lv_cfg[5];
                if (Math.random() < cfg.r) this.make_move(moves[Math.floor(Math.random() * moves.length)].m);
                else {
                    this.start_time = Date.now(); this.time_limit = cfg.t; this.abort_search = false;
                    let best_m = moves[0].m;
                    for (let d = 1; d <= cfg.d; d++) {
                        let cur_best_v = -1000000; let cur_best_m = null;
                        for (let move of moves) {
                            if (Date.now() - this.start_time > this.time_limit) { this.abort_search = true; break; }
                            const val = this.minimax(own | move.b | move.f, opp & ~move.f, d - 1, -1000000, 1000000, false, false);
                            if (val > cur_best_v) { cur_best_v = val; cur_best_m = move.m; }
                        }
                        if (this.abort_search) break;
                        best_m = cur_best_m; this.current_cpu_depth = d;
                    }
                    this.make_move(best_m);
                }
            }

            reset_game() {
                this.black_bits = this.get_bit(4, 3) | this.get_bit(3, 4);
                this.white_bits = this.get_bit(3, 3) | this.get_bit(4, 4);
                this.turn = 'black'; this.history = []; this.last_move = null; this.hint_move = null;
                this.is_game_over = false; this.pass_msg = ""; this.current_cpu_depth = 0; this.current_hint_depth = 0;
                this.result_label.style.display = "none"; this.update_settings_ui(); this.draw();
                if (this.mode === "PvE" && this.cpu_color === 'black') setTimeout(() => this.cpu_move(), 600);
            }

            update_settings_ui() {
                if (this.mode === "PvE") {
                    const colorTxt = this.cpu_color === 'black' ? "黒 (先手)" : "白 (後手)";
                    this.settings_display.innerHTML = `CPU戦 レベル: ${this.level}<br>CPUの色: ${colorTxt}`;
                } else {
                    this.settings_display.innerText = `対戦モード: 対人戦`;
                }
            }

            draw() {
                this.ctx.clearRect(0, 0, 600, 650);
                this.ctx.strokeStyle = "black"; this.ctx.lineWidth = 1.2;
                VALID_COORDS.forEach(c => {
                    let x1 = this.offset + c[0] * this.cell_size, y1 = this.offset + c[1] * this.cell_size;
                    [[1,0], [0,1], [1,1], [1,-1]].forEach(([dx, dy]) => {
                        let tx = c[0] + dx, ty = c[1] + dy;
                        if (VALID_COORDS.some(v => v[0] === tx && v[1] === ty)) {
                            let x2 = this.offset + tx * this.cell_size, y2 = this.offset + ty * this.cell_size;
                            this.ctx.beginPath(); this.ctx.moveTo(x1, y1); this.ctx.lineTo(x2, y2); this.ctx.stroke();
                        }
                    });
                });
                let cx = this.offset + 3.5 * this.cell_size, cy = this.offset + 3.5 * this.cell_size;
                this.ctx.beginPath(); this.ctx.arc(cx, cy, this.cell_size * 3.8, 0, Math.PI * 2);
                this.ctx.lineWidth = 2; this.ctx.stroke();
                const own = this.turn === 'black' ? this.black_bits : this.white_bits;
                const opp = this.turn === 'black' ? this.white_bits : this.black_bits;
                VALID_COORDS.forEach(([x, y]) => {
                    let px = this.offset + x * this.cell_size, py = this.offset + y * this.cell_size;
                    const b = this.get_bit(x, y);
                    if (this.black_bits & b || this.white_bits & b) {
                        this.ctx.beginPath(); this.ctx.arc(px, py, this.cell_size * 0.38, 0, Math.PI * 2);
                        this.ctx.fillStyle = (this.black_bits & b) ? "black" : "white";
                        this.ctx.fill(); this.ctx.strokeStyle = "#888"; this.ctx.stroke();
                        if (this.last_move && x === this.last_move[0] && y === this.last_move[1]) {
                            this.ctx.beginPath(); this.ctx.arc(px, py, this.cell_size * 0.4, 0, Math.PI * 2);
                            this.ctx.strokeStyle = "red"; this.ctx.lineWidth = 3; this.ctx.stroke();
                        }
                    } else {
                        this.ctx.beginPath(); this.ctx.arc(px, py, 4, 0, Math.PI * 2);
                        this.ctx.fillStyle = "#556B2F"; this.ctx.fill();
                        if (!this.is_game_over && (this.mode === "PvP" || this.turn !== this.cpu_color)) {
                            if (this.get_flipped_bits(b, own, opp) !== 0n) {
                                this.ctx.beginPath(); this.ctx.arc(px, py, this.cell_size * 0.2, 0, Math.PI * 2);
                                this.ctx.fillStyle = "rgba(255, 255, 204, 0.6)"; this.ctx.fill();
                            }
                        }
                    }
                });
                if (this.hint_move) {
                    const [hc, hr] = this.hint_move;
                    this.ctx.strokeStyle = "#3498db"; this.ctx.lineWidth = 5;
                    this.ctx.strokeRect(this.offset + hc * this.cell_size - (this.cell_size/2) + 5, this.offset + hr * this.cell_size - (this.cell_size/2) + 5, this.cell_size - 10, this.cell_size - 10);
                }
                this.update_status_ui();
            }

            update_status_ui() {
                let b = this.count_set_bits(this.black_bits), w = this.count_set_bits(this.white_bits);
                let status = `黒: ${b}  白: ${w} | 次: ${this.turn === 'black' ? "黒" : "白"}`;
                if (this.pass_msg) status = `${this.pass_msg} ${status}`;
            // if (this.hint_move && this.current_hint_depth > 0) status += ` | 💡ヒント予測:${this.current_hint_depth}手`;
            // else if (this.mode === "PvE" && this.current_cpu_depth > 0) status += ` | 🤖CPU予測:${this.current_cpu_depth}手`;
                this.status_label.innerText = status;
            }

            make_move(coord) {
                if (this.is_game_over) return;
                this.hint_move = null; this.current_hint_depth = 0;
                if (this.turn !== this.cpu_color) this.current_cpu_depth = 0;
                const b = this.get_bit(coord[0], coord[1]);
                const own = this.turn === 'black' ? this.black_bits : this.white_bits;
                const opp = this.turn === 'black' ? this.white_bits : this.black_bits;
                const f = this.get_flipped_bits(b, own, opp);
                if (f !== 0n) {
                    this.pass_msg = ""; this.history.push({black: this.black_bits, white: this.white_bits, turn: this.turn, last: this.last_move});
                    if (this.turn === 'black') { this.black_bits |= (b | f); this.white_bits &= ~f; }
                    else { this.white_bits |= (b | f); this.black_bits &= ~f; }
                    this.last_move = coord; this.turn = this.turn === 'black' ? 'white' : 'black';
                    this.draw(); setTimeout(() => this.check_pass(), 300);
                }
            }

            check_pass() {
                const own = this.turn === 'black' ? this.black_bits : this.white_bits;
                const opp = this.turn === 'black' ? this.white_bits : this.black_bits;
                const has_move = VALID_COORDS.some(c => this.get_flipped_bits(this.get_bit(c[0], c[1]), own, opp) !== 0n);
                if (!has_move) {
                    const opp_has = VALID_COORDS.some(c => this.get_flipped_bits(this.get_bit(c[0], c[1]), opp, own) !== 0n);
                    if (!opp_has) return this.end_game();
                    this.pass_msg = `【${this.turn === 'black' ? "黒" : "白"}はパス】`;
                    this.history.push({black: this.black_bits, white: this.white_bits, turn: this.turn, last: this.last_move});
                    this.turn = this.turn === 'black' ? 'white' : 'black'; this.draw();
                    if (this.mode === "PvE" && this.turn === this.cpu_color) setTimeout(() => this.cpu_move(), 800);
                } else if (this.mode === "PvE" && this.turn === this.cpu_color) setTimeout(() => this.cpu_move(), 600);
            }

            end_game() {
                this.is_game_over = true; this.hint_move = null;
                const b = this.count_set_bits(this.black_bits), w = this.count_set_bits(this.white_bits);
                this.result_label.innerText = b > w ? "黒の勝ち！" : w > b ? "白の勝ち！" : "引き分け";
                this.result_label.style.display = "block"; this.draw();
            }

            undo() {
                if (this.history.length === 0) return;
                
                // 実行待ちのタイマー（CPU思考やパス判定）をすべてキャンセル
                if (this.pass_timer) {
                    clearTimeout(this.pass_timer);
                    this.pass_timer = null;
                }

                this.is_game_over = false; 
                this.result_label.style.display = "none";
                this.pass_msg = ""; 
                this.hint_move = null;

                // --- ここから戻す手数の判定 ---
                if (this.mode === "PvE") {
                    // 直前の履歴を取り出して、誰の番だったか確認する
                    const lastState = this.history[this.history.length - 1];
                    
                    if (lastState.turn !== this.cpu_color) {
                        // 直前が「自分」の手なら、まだCPUは置いていないので1手だけ戻す
                        let s = this.history.pop();
                        this.black_bits = s.black; 
                        this.white_bits = s.white; 
                        this.turn = s.turn; 
                        this.last_move = s.last;
                    } else {
                        // 直前が「CPU」の手なら、CPUが置いた後なので2手戻す
                        for (let i = 0; i < 2; i++) {
                            if (this.history.length > 0) {
                                let s = this.history.pop();
                                this.black_bits = s.black; 
                                this.white_bits = s.white; 
                                this.turn = s.turn; 
                                this.last_move = s.last;
                            }
                        }
                    }
                } else {
                    // PvP（対人戦）なら常に1手戻す
                    let s = this.history.pop();
                    this.black_bits = s.black; 
                    this.white_bits = s.white; 
                    this.turn = s.turn; 
                    this.last_move = s.last;
                }
                // --- 判定ここまで ---

                this.draw();

                // 戻した結果、もしCPUの手番なら再起動、自分の手番ならガイド表示
                if (this.mode === "PvE" && this.turn === this.cpu_color) {
                    this.pass_timer = setTimeout(() => this.cpu_move(), 600);
                } else {
                    this.check_pass();
                }
            }


            handle_click(event) {
                if (this.is_game_over || (this.mode === "PvE" && this.turn === this.cpu_color)) return;
                let rect = this.canvas.getBoundingClientRect();
                let x = (event.clientX - rect.left) * (this.canvas.width / rect.width);
                let y = (event.clientY - rect.top) * (this.canvas.height / rect.height);
                let best = null, min_d = 31;
                VALID_COORDS.forEach(c => {
                    let d = Math.hypot(this.offset + c[0] * this.cell_size - x, this.offset + c[1] * this.cell_size - y);
                    if (d < min_d) { min_d = d; best = c; }
                });
                if (best) this.make_move(best);
            }

            setup_ui_events() {
                this.canvas.onclick = (e) => this.handle_click(e);
                document.getElementById("undo-btn").onclick = () => this.undo();
                document.getElementById("hint-btn").onclick = () => this.show_hint();
                document.getElementById("reset-btn").onclick = () => this.reset_game();
                document.getElementById("menu-btn").onclick = () => this.show_menu();
                document.getElementById("btn-pvp").onclick = () => this.start_game("PvP");
                document.getElementById("btn-pve").onclick = () => this.start_game("PvE");
            }

            start_game(mode) {
                this.mode = mode; this.cpu_color = window.cpuColor; this.level = window.selectedLv;
                document.getElementById("menu-screen").style.display = "none";
                document.getElementById("game-screen").style.display = "block";
                this.reset_game();
            }

            show_menu() { document.getElementById("game-screen").style.display = "none"; document.getElementById("menu-screen").style.display = "block"; }
        }
        window.onload = () => { new NipWebGame(); };
    </script>
