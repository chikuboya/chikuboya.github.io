<h2>序盤のコツ</h2>

<p>
序盤は中央付近を意識して石を配置します。
相手に有利な形を作らないことが重要です。
</p>

<h2>中盤の戦略</h2>

<p>
複数方向から石を挟める位置を狙います。
円形の盤面では予想外の方向から石が返ることがあります。
</p>

<h2>終盤</h2>

<p>
残りマスが少なくなると一手の影響が大きくなります。
相手の置ける場所を減らす戦略が重要になります。
</p>
