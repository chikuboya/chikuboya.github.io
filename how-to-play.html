<h2>ゲームの目的</h2>

<p>
NIPは円形の盤面を使ったオセロ型の戦略ゲームです。
相手の石を挟んで自分の色に変え、最終的に石の数が多いプレイヤーが勝利します。
</p>

<h2>基本ルール</h2>

<p>
プレイヤーは交互に石を置きます。
相手の石を自分の石で挟むことで石を裏返すことができます。
</p>

<h2>勝利条件</h2>

<p>
盤面がすべて埋まるか、両プレイヤーが置けなくなった時点でゲーム終了です。
最も石の多いプレイヤーが勝利となります。
</p>
